<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRCC Digital - Windows 95 Edition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="app" class="flex flex-col items-center gap-6">
        
        <!-- PAGE 1 -->
        <div class="win-window" style="max-width: 600px; min-width: 320px;">
            
            <!-- Title Bar -->
            <div class="win-title-bar">
                <span style="display: flex; align-items: center;">
                    <span class="win-title-icon">📋</span>
                    PRCC Digital - Registro de Cadena de Custodia
                </span>
                <div style="display: flex; gap: 2px;">
                    <button style="padding: 2px 8px; min-width: 20px; font-size: 10px;">_</button>
                    <button style="padding: 2px 8px; min-width: 20px; font-size: 10px;">□</button>
                    <button style="padding: 2px 8px; min-width: 20px; font-size: 10px;">×</button>
                </div>
            </div>
            
            <div class="win-content">
                <!-- Header Section -->
                <div style="text-align: center; margin-bottom: 16px; border-bottom: 2px solid #808080; padding-bottom: 12px;">
                    <h1 style="font-size: 16px; font-weight: bold; margin: 0 0 4px 0;">Planilla de Registro</h1>
                    <h2 style="font-size: 14px; font-weight: bold; margin: 0 0 4px 0;">de Cadena de Custodia</h2>
                    <p style="font-size: 12px; margin: 0;">(PRCC)</p>
                </div>

                <!-- Section I: Datos Generales -->
                <fieldset class="win-group">
                    <span class="win-group-label">I. DATOS GENERALES</span>
                    <div class="grid-2">
                        <div class="form-row">
                            <label class="form-label">a. N° de Expediente</label>
                            <input type="text" id="expediente" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">b. N° PRCC</label>
                            <input type="text" id="prcc" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">c. Despacho que instruye</label>
                            <input type="text" id="despacho_instruye" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">d. Organismo que investiga</label>
                            <input type="text" id="organismo_investiga" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">e. Despacho que inicia custodia</label>
                            <input type="text" id="despacho_custodia" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">f. Organismo que custodia</label>
                            <input type="text" id="organismo_custodia" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">g. Dirección de Obtención</label>
                            <input type="text" id="direccion_obtencion" />
                        </div>
                        <div class="form-row">
                            <label class="form-label">h. Fecha y Hora</label>
                            <input type="text" id="fecha_hora" readonly />
                        </div>
                    </div>
                </fieldset>

                <!-- Section II: Formas de Obtención -->
                <fieldset class="win-group">
                    <span class="win-group-label">II. FORMAS DE OBTENCIÓN</span>
                    <div class="grid-2">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="obtencion_tecnica" />
                            <span>1. Técnica</span>
                        </label>
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="obtencion_aseguramiento" />
                            <span>2. Aseguramiento</span>
                        </label>
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="obtencion_consignacion" />
                            <span>3. Consignación</span>
                        </label>
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="obtencion_derivacion" />
                            <span>4. Derivación</span>
                        </label>
                    </div>
                </fieldset>

                <!-- Action Buttons -->
                <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
                    <button onclick="saveData()">💾 Guardar</button>
                    <button onclick="exportJSON()">📄 Exportar JSON</button>
                    <button onclick="window.print()">🖨️ Imprimir</button>
                </div>
            </div>
        </div>

        <!-- Notification -->
        <div id="notification" class="win-window hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; z-index: 1000;">
            <div class="win-title-bar" style="background: linear-gradient(90deg, #000080, #1084d0);">
                <span>Mensaje</span>
                <button onclick="closeNotification()" style="padding: 2px 6px; min-width: 20px; font-size: 10px;">×</button>
            </div>
            <div class="win-content" style="display: flex; align-items: center; gap: 12px; padding: 16px;">
                <span style="font-size: 24px;">ℹ️</span>
                <span id="notification-message">Operación completada</span>
            </div>
            <div style="text-align: center; padding: 8px;">
                <button onclick="closeNotification()">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
